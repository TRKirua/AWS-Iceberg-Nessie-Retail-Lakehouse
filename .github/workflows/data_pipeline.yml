name: Data Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate directory structure
        run: |
          echo "Validating project structure..."
          [ -d "src/lakehouse" ] || { echo "src/lakehouse not found"; exit 1; }
          [ -d "scripts" ] || { echo "scripts not found"; exit 1; }
          [ -d "notebooks" ] || { echo "notebooks not found"; exit 1; }
          [ -d "data" ] || { echo "data not found"; exit 1; }
          [ -f "requirements.txt" ] || { echo "requirements.txt not found"; exit 1; }
          [ -f "src/lakehouse/spark_session.py" ] || { echo "spark_session.py not found"; exit 1; }
          [ -f "src/lakehouse/settings.py" ] || { echo "settings.py not found"; exit 1; }
          echo "Structure validation passed!"

  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check src/lakehouse/ scripts/ --output-format=github
        continue-on-error: true

  validate-scripts:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          echo "Validating Python scripts..."
          for script in scripts/*.py; do
            echo "Checking $script..."
            python -m py_compile "$script" || { echo "Syntax error in $script"; exit 1; }
          done
          for module in src/lakehouse/*.py; do
            echo "Checking $module..."
            python -m py_compile "$module" || { echo "Syntax error in $module"; exit 1; }
          done
          echo "All scripts validated!"

  validate-notebooks:
    name: Validate Jupyter Notebooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbformat

      - name: Validate notebook structure
        run: |
          echo "Validating Jupyter notebooks..."
          for notebook in notebooks/*.ipynb; do
            echo "Checking $notebook..."
            python -c "import json; json.load(open('$notebook'))" || { echo "Invalid JSON in $notebook"; exit 1; }
          done
          echo "All notebooks validated!"

  check-metadata:
    name: Check Project Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README
        run: |
          if [ ! -f "README.md" ]; then
            echo "README.md not found!"
            exit 1
          fi
          echo "README.md exists"

      - name: Check requirements.txt
        run: |
          if [ ! -s "requirements.txt" ]; then
            echo "requirements.txt is empty!"
            exit 1
          fi
          echo "requirements.txt is valid"

  # Upload data to S3 on every push to main branch
  # This ensures the S3 bucket is always updated with the latest data files
  upload-to-s3:
    name: Upload Data to S3
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 python-dotenv

      - name: Upload source data to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-3' }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
        run: |
          python scripts/upload_to_s3.py

      - name: Upload batch data to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'eu-west-3' }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
        run: |
          python scripts/upload_to_s3.py --batch-files
        continue-on-error: true

